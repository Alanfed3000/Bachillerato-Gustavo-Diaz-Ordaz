<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login y Carrusel</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous" />
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/Login.css">
  <script src="../js/Login.js" defer></script>
</head>
<body>
    <div class="logo-container">
        <img src="../logo/logo.png" alt="Logo" />
    </div>

     <div class="header">
    <div class="logo-text">BACHILLERATO GUSTAVO DÍAZ ORDAZ</div>
  </div>

  <div class="container-fluid vh-100">
    <div class="row h-100">
      <!-- Login a la izquierda -->
      <div class="col-md-6 d-flex align-items-center justify-content-center login-form">
        <div class="w-75">
          <h4>Bienvenido Docente</h4>
          <form action="#" method="POST">
            <div>
              <label for="username">Usuario</label>
              <input type="text" name="username" id="username" class="form-control">
            </div>
            <div>
              <label for="password">Contraseña</label>
              <input type="password" name="password" id="password" class="form-control">
            </div>
            <div>
              <button type="submit" id="btnSubmit" class="btn btn-primary mt-2">Iniciar sesión</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Carrusel a la derecha -->
      <div class="col-md-6 d-flex align-items-center">
        <div class="carousel-container w-100 borde">
          <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
              <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active"
                aria-current="true" aria-label="Slide 1"></button>
              <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1"
                aria-label="Slide 2"></button>
              <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2"
                aria-label="Slide 3"></button>
            </div>
            <div class="carousel-inner">
              <div class="carousel-item active">
                <img src="../logo/patio3.jpg" class="d-block w-100" alt="Imagen 1">
                <div class="carousel-caption d-none d-md-block">
                  <h5>Primera imagen</h5>
                  <p>Texto descriptivo de la primera imagen.</p>
                </div>
              </div>
              <div class="carousel-item">
                <img src="../logo/Patio1.jpg" class="d-block w-100" alt="Imagen 2">
                <div class="carousel-caption d-none d-md-block">
                  <h5>Segunda imagen</h5>
                  <p>Texto descriptivo de la segunda imagen.</p>
                </div>
              </div>
              <div class="carousel-item">
                <img src="../logo/Patio2.jpg" class="d-block w-100" alt="Imagen 3">
                <div class="carousel-caption d-none d-md-block">
                  <h5>Tercera imagen</h5>
                  <p>Texto descriptivo de la tercera imagen.</p>
                </div>
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions"
              data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions"
              data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Siguiente</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous">
  </script>
</body>

</html>

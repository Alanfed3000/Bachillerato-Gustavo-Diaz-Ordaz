<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidebar</title>
    <link rel="stylesheet" href="/style.css" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <script src="script.js" defer></script>
</body>
</head>

<body>
    <div class="header">
    <div class="logo-text">BACHILLERATO GUSTAVO DÍAZ ORDAZ</div>
  </div>
    <div class="Sidebar">
        <div class="header">
            <div class="menu-btn">
                <i class="bx bx-chevron-left"></i>
            </div>
            <div class="brand">
                <img src="logo/usuario.png" alt="logo" />
                <span>Admin</span>
            </div>

        </div>

        <div class="menu-container">
            <div class="search">
                <i class="bx bx-search"></i>
                <input type="search" placeholder="search" />
            </div>
            <u1 class="menu">
                <li class="menu-item menu-item-static active">
                    <a href="#" class="menu-link">
                        <i class='bx  bx-home-alt-2'></i>
                        <span>Home</span>

                    </a>
                </li>
                <li class="menu-item menu-item-static">
                    <a href="#" class="menu-link">
                        <i class='bx  bx-bar-chart-alt-2'></i>
                        <span>Dashboard</span>

                    </a>
                </li>


                <li class="menu-item menu-item-dropdown">
                    <a href="#" class="menu-link">
                        <i class='bx  bx-shopping-bag'></i>
                        <span>Formulario Registro</span>
                        <i class='bx  bx-chevron-down'></i>

                    </a>
                    <ul class="sub-menu">
                        <li><a href="#" class=" sub-menu-link">Prueba 1</a></li>
                        <li><a href="#" class=" sub-menu-link">Prueba 2</a></li>
                        <li><a href="#" class=" sub-menu-link">Informacion 2 </a></li>
                    </ul>
                </li>
                <li class="menu-item menu-item-static">
                    <a href="#" class="menu-link">
                        <i class='bx  bx-task'></i>
                        <span>Task</span>

                    </a>
                </li>
                <li class="menu-item menu-item-dropdown">
                    <a href="#" class="menu-link">
                        <i class='bx  bx-file-blank'></i>
                        <span>File</span>
                        <i class='bx  bx-chevron-down'></i>

                    </a>
                    <ul class="sub-menu">
                        <li><a href="#" class=" sub-menu-link">Prueba 3</a></li>
                        <li><a href="#" class=" sub-menu-link">Prueba 4</a></li>

                    </ul>
                </li>
            </u1>
        </div>
        <div class="footer">
            <ul class="menu">
                <li class="menu-item menu-item-static active">
                    <a href="#" class="menu-link">
                        <i class='bx  bx-bell-check'></i>
                        <span>Noti</span>

                    </a>
                </li>
                <li class="menu-item menu-item-static">
                    <a href="#" class="menu-link">
                        <i class='bx  bx-brightness'></i>
                        <span>Confi</span>

                    </a>
                </li>

            </ul>
            <div class="user">
                <div class="user-img">
                    <img src="logo/user.svg" alt="user">

                </div>
                <div class="user-data">
                    <span class="name">Administrador 1</span>
                    <span class="email"> Administrador@gmail.com</span>

                </div>
                <div class="user-icon">
                    <i class='bx  bxs-door-open'></i> 


                </div>

            </div>

        </div>
    </div>

</body>

</html>
